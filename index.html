<script>
/* Détection de langue — préférence mémorisée puis langues du navigateur,
   repli anglais. Jamais de géolocalisation IP. Les paramètres (UTM…) et
   l'ancre sont préservés. */
(function(){
  var DIRS = {"fr":1,"en":1,"es":1,"de":1,"it":1,"pt-br":1,"pt-pt":1,"nl":1,"ru":1,"ar":1,"ja":1,"ko":1,"zh-cn":1,"zh-tw":1};
  function pick(){
    try {
      var saved = localStorage.getItem('dropp-lang');
      if (saved && DIRS[saved]) return saved;
    } catch(e){}
    var langs = (navigator.languages && navigator.languages.length)
      ? navigator.languages : [navigator.language || 'en'];
    for (var i = 0; i < langs.length; i++) {
      var l = String(langs[i]).toLowerCase();
      if (DIRS[l]) return l;
      if (l.indexOf('zh') === 0) return /hant|tw|hk|mo/.test(l) ? 'zh-tw' : 'zh-cn';
      if (l.indexOf('pt') === 0) return l === 'pt-pt' ? 'pt-pt' : 'pt-br';
      var base = l.split('-')[0];
      if (DIRS[base]) return base;
    }
    return 'en';
  }
  location.replace('/' + pick() + '/' + location.search + location.hash);
})();
</script>
